<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>OG Image Generator — NotioAI</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { margin: 0; background: #1a1714; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; font-family: 'DM Sans', sans-serif; }
    h2 { color: #fff; margin-bottom: 20px; font-size: 1rem; opacity: .6; }
    canvas { border-radius: 8px; box-shadow: 0 20px 60px rgba(0,0,0,.6); }
    button {
      margin-top: 24px; padding: 12px 32px;
      background: #e8855a; color: #fff; border: none;
      border-radius: 10px; font-size: 1rem; font-weight: 600;
      cursor: pointer; font-family: inherit;
    }
    button:hover { background: #d4714a; }
  </style>
</head>
<body>
  <h2>NotioAI — OG Image (1200 × 630)</h2>
  <canvas id="canvas" width="1200" height="630"></canvas>
  <button onclick="download()">PNG Olarak İndir</button>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    function draw() {
      const W = 1200, H = 630;

      // Arka plan
      ctx.fillStyle = '#0c0a08';
      ctx.fillRect(0, 0, W, H);

      // Sol üst köşe accent gradient
      const gLeft = ctx.createRadialGradient(0, 0, 0, 0, 0, 500);
      gLeft.addColorStop(0, 'rgba(232,133,90,0.18)');
      gLeft.addColorStop(1, 'rgba(232,133,90,0)');
      ctx.fillStyle = gLeft;
      ctx.fillRect(0, 0, W, H);

      // Sağ alt köşe accent gradient
      const gRight = ctx.createRadialGradient(W, H, 0, W, H, 600);
      gRight.addColorStop(0, 'rgba(124,106,247,0.12)');
      gRight.addColorStop(1, 'rgba(124,106,247,0)');
      ctx.fillStyle = gRight;
      ctx.fillRect(0, 0, W, H);

      // Grid çizgiler (ince)
      ctx.strokeStyle = 'rgba(255,220,170,0.04)';
      ctx.lineWidth = 1;
      for (let x = 0; x < W; x += 80) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
      for (let y = 0; y < H; y += 80) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

      // Logo icon (rounded rect + lines)
      const lx = 80, ly = 80;
      roundRect(ctx, lx, ly, 56, 56, 14, '#e8855a', null);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      lines(ctx, lx+12, ly+16, 32); // line 1
      lines(ctx, lx+12, ly+26, 22); // line 2
      lines(ctx, lx+12, ly+36, 26); // line 3

      // Logo text
      ctx.fillStyle = '#ffffff';
      ctx.font = '700 28px "DM Sans", sans-serif';
      ctx.fillText('NotioAI', lx + 70, ly + 38);

      // Badge
      roundRect(ctx, 80, 180, 210, 36, 18, 'rgba(232,133,90,0.15)', 'rgba(232,133,90,0.4)');
      ctx.fillStyle = '#e8855a';
      ctx.font = '500 14px "DM Sans", sans-serif';
      ctx.fillText('✦  Yapay Zeka Destekli', 112, 202);

      // Ana başlık
      ctx.fillStyle = '#ffffff';
      ctx.font = '700 64px "DM Sans", sans-serif';
      wrapText(ctx, 'Belgelerinizi Yapay', 80, 290, 700, 76);
      wrapText(ctx, 'Zeka Üretsin', 80, 370, 700, 76);

      // Gradient text efekti (accent color)
      const titleGrad = ctx.createLinearGradient(80, 370, 500, 450);
      titleGrad.addColorStop(0, '#e8855a');
      titleGrad.addColorStop(1, '#f4a574');
      ctx.fillStyle = titleGrad;
      ctx.font = '700 64px "DM Sans", sans-serif';
      ctx.fillText('Zeka Üretsin', 80, 370);

      // Alt açıklama
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.font = '400 22px "DM Sans", sans-serif';
      ctx.fillText('PDF · Word · PowerPoint · Sınav Soruları', 80, 440);

      // Özellik etiketleri
      const tags = ['TYT / AYT / LGS', 'Ders Planı', 'Sınav Sorusu', 'Makale Özeti'];
      let tx = 80;
      tags.forEach(tag => {
        const tw = ctx.measureText(tag).width + 28;
        roundRect(ctx, tx, 490, tw, 38, 10, 'rgba(255,255,255,0.06)', 'rgba(255,255,255,0.12)');
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.font = '500 14px "DM Sans", sans-serif';
        ctx.fillText(tag, tx + 14, 514);
        tx += tw + 12;
      });

      // Sağ taraf — dekoratif kart
      const cx = 780, cy = 140, cw = 340, ch = 340;
      roundRect(ctx, cx, cy, cw, ch, 20, 'rgba(255,255,255,0.04)', 'rgba(255,255,255,0.08)');

      // Kart içi — simüle edilmiş UI
      ctx.fillStyle = 'rgba(255,255,255,0.06)';
      roundRect(ctx, cx+20, cy+20, cw-40, 44, 10, 'rgba(255,255,255,0.06)', null);
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.font = '500 13px "DM Sans", sans-serif';
      ctx.fillText('Türev ve İntegral konusunda soru üret...', cx+36, cy+47);

      // Şık butonları simülasyonu
      const opts = ['A) x² + C', 'B) 2x + C', 'C) x + C', 'D) 2x² + C'];
      opts.forEach((opt, i) => {
        const oy = cy + 88 + i * 52;
        const isCorrect = i === 0;
        roundRect(ctx, cx+20, oy, cw-40, 40, 8,
          isCorrect ? 'rgba(34,197,94,0.15)' : 'rgba(255,255,255,0.04)',
          isCorrect ? 'rgba(34,197,94,0.5)' : 'rgba(255,255,255,0.08)');
        ctx.fillStyle = isCorrect ? '#4ade80' : 'rgba(255,255,255,0.6)';
        ctx.font = `${isCorrect ? '600' : '400'} 13px "DM Sans", sans-serif`;
        ctx.fillText(opt, cx+36, oy+25);
      });

      // Sağ alt — notioai.net
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.font = '400 16px "DM Sans", sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText('notioai.net', W - 80, H - 50);
      ctx.textAlign = 'left';
    }

    function lines(ctx, x, y, len) {
      ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + len, y); ctx.stroke();
    }

    function roundRect(ctx, x, y, w, h, r, fill, stroke) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
      if (fill) { ctx.fillStyle = fill; ctx.fill(); }
      if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 1; ctx.stroke(); }
    }

    function wrapText(ctx, text, x, y, maxW, lineH) {
      ctx.fillText(text, x, y);
    }

    function download() {
      const link = document.createElement('a');
      link.download = 'og-image.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    // Font yüklenince çiz
    document.fonts.ready.then(draw);
  </script>
</body>
</html>
