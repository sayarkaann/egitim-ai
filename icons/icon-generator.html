<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Icon Generator</title>
<style>body{font-family:sans-serif;padding:40px;background:#1a1714;color:#fff;display:flex;flex-direction:column;align-items:center;gap:20px;}
button{padding:10px 24px;background:#e8855a;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:.9rem;font-weight:600;}
button:hover{background:#d4714a;}</style>
</head>
<body>
<h2 style="margin:0">NotioAI Icon Generator</h2>
<canvas id="c192" width="192" height="192" style="border-radius:20px"></canvas>
<canvas id="c512" width="512" height="512" style="border-radius:52px;width:128px;height:128px"></canvas>
<div style="display:flex;gap:12px">
  <button onclick="dl('c192','icon-192.png')">icon-192.png İndir</button>
  <button onclick="dl('c512','icon-512.png')">icon-512.png İndir</button>
</div>
<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  const r = s * 0.21;

  // Arka plan
  ctx.fillStyle = '#e8855a';
  roundRect(ctx, 0, 0, s, s, r);
  ctx.fill();

  // Çizgiler
  ctx.strokeStyle = '#fff';
  ctx.lineCap = 'round';
  const lx = s * 0.25, lw1 = s * 0.5, lw2 = s * 0.375, lw3 = s * 0.417, lw4 = s * 0.292;
  const ly1 = s * 0.333, ly2 = s * 0.458, ly3 = s * 0.583, ly4 = s * 0.708;
  ctx.lineWidth = s * 0.073;
  [[lw1,ly1],[lw2,ly2],[lw3,ly3],[lw4,ly4]].forEach(([w,y]) => {
    ctx.beginPath(); ctx.moveTo(lx,y); ctx.lineTo(lx+w,y); ctx.stroke();
  });

  // Daire
  const cx = s*0.771, cy = s*0.688, cr = s*0.146;
  ctx.beginPath(); ctx.arc(cx, cy, cr, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.95)'; ctx.fill();

  // Check mark
  ctx.strokeStyle = '#e8855a';
  ctx.lineWidth = s*0.047;
  ctx.beginPath();
  ctx.moveTo(cx - cr*0.5, cy);
  ctx.lineTo(cx - cr*0.1, cy + cr*0.5);
  ctx.lineTo(cx + cr*0.6, cy - cr*0.5);
  ctx.stroke();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function dl(id, name) {
  const a = document.createElement('a');
  a.download = name;
  a.href = document.getElementById(id).toDataURL('image/png');
  a.click();
}

drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));
</script>
</body>
</html>
