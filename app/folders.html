<body id="foldersPage">

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar__logo">
      <div class="sidebar__logo-icon">
        <svg width="18" height="18" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="28" height="28" rx="8" fill="white" fill-opacity="0.15"/>
          <path d="M7 8h14M7 12h10M7 16h12M7 20h8" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
          <circle cx="21" cy="19" r="4" fill="#fff" opacity=".9"/>
          <path d="M19.5 19l1 1 2-2" stroke="#e8855a" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="sidebar__logo-text">NotioAI</span>
    </div>
    <nav class="sidebar__nav">
      <div class="sidebar__section-label">Genel</div>
      <a href="index.html" class="sidebar__link"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></a>
      <a href="create.html" class="sidebar__link"><i data-lucide="plus-circle"></i><span>Yeni Oluştur</span></a>
      <div class="sidebar__section-label">Kütüphane</div>
      <a href="history.html" class="sidebar__link"><i data-lucide="clock"></i><span>Geçmiş</span></a>
      <a href="analyze.html" class="sidebar__link"><i data-lucide="file-search"></i><span>Makale Özetle</span></a>
      <a href="exam.html" class="sidebar__link"><i data-lucide="graduation-cap"></i><span>Sınav Hazırlık</span></a>
      <a href="templates.html" class="sidebar__link"><i data-lucide="bookmark"></i><span>Şablonlar</span></a>
      <a href="folders.html" class="sidebar__link sidebar__link--active"><i data-lucide="folder"></i><span>Klasörlerim</span></a>
      <div class="sidebar__section-label">Hesap</div>
      <a href="pricing.html" class="sidebar__link"><i data-lucide="crown"></i><span>Planlar</span></a>
      <a href="settings.html" class="sidebar__link"><i data-lucide="settings"></i><span>Ayarlar</span></a>
      <a href="help.html" class="sidebar__link"><i data-lucide="help-circle"></i><span>Yardım</span></a>
    </nav>
    <div class="sidebar__footer">
      <div class="sidebar__user">
        <div class="sidebar__avatar" data-user-avatar>?</div>
        <div class="sidebar__user-info">
          <div class="sidebar__user-name" data-user-name>Yükleniyor...</div>
          <div class="sidebar__user-plan" data-user-plan>Ücretsiz Plan</div>
        </div>
        <button class="btn btn--icon" data-action="logout" title="Çıkış Yap"><i data-lucide="log-out"></i></button>
      </div>
    </div>
  </aside>

  <header class="topbar">
    <div class="topbar__left">
      <button class="mobile-topbar-toggle" id="sidebarToggle" aria-label="Menüyü Aç"><i data-lucide="menu"></i></button>
      <div class="topbar__breadcrumb">
        <span>NotioAI</span>
        <i data-lucide="chevron-right" style="width:14px;height:14px;"></i>
        <span style="color:var(--text)">Klasörlerim</span>
      </div>
    </div>
    <div class="topbar__right">
      <button class="btn btn--primary btn--sm" id="newFolderBtn">
        <i data-lucide="folder-plus"></i> Yeni Klasör
      </button>
    </div>
  </header>

  <main class="app-content">
    <div class="create-header fade-up">
      <h1>Klasörlerim</h1>
      <p>Belgelerinizi klasörlere ayırarak düzenleyin.</p>
    </div>

    <!-- Klasör kartları -->
    <div class="folders-grid fade-up fade-up--1" id="foldersGrid">
      <!-- JS ile doldurulur -->
    </div>

    <!-- Seçili klasörün belgeleri -->
    <div class="folder-docs-section fade-up fade-up--2" id="folderDocsSection" style="display:none;margin-top:32px;">
      <div class="folder-docs-header">
        <i data-lucide="folder-open" style="color:var(--accent);width:18px;height:18px;"></i>
        <h2 id="folderDocsTitle" style="font-size:1rem;font-weight:600;"></h2>
      </div>
      <div class="docs-table" style="margin-top:12px;">
        <div class="docs-table__header">
          <div>Belge Adı</div>
          <div>Tür</div>
          <div>Boyut</div>
          <div>Tarih</div>
          <div></div>
        </div>
        <div id="folderDocsTable"></div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
