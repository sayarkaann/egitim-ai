<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NotioAI — Geçmiş</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/app.css?v=3" />
</head>
<body id="historyPage">

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar__logo">
      <div class="sidebar__logo-icon">
        <svg width="18" height="18" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="28" height="28" rx="8" fill="white" fill-opacity="0.15"/>
          <path d="M7 8h14M7 12h10M7 16h12M7 20h8" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
          <circle cx="21" cy="19" r="4" fill="#fff" opacity=".9"/>
          <path d="M19.5 19l1 1 2-2" stroke="#e8855a" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="sidebar__logo-text">NotioAI</span>
    </div>
    <nav class="sidebar__nav">
      <div class="sidebar__section-label">Genel</div>
      <a href="index.html" class="sidebar__link"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></a>
      <a href="create.html" class="sidebar__link"><i data-lucide="plus-circle"></i><span>Yeni Oluştur</span></a>
      <div class="sidebar__section-label">Kütüphane</div>
      <a href="history.html" class="sidebar__link sidebar__link--active"><i data-lucide="clock"></i><span>Geçmiş</span></a>
      <a href="templates.html" class="sidebar__link"><i data-lucide="bookmark"></i><span>Şablonlar</span></a>
      <a href="folders.html" class="sidebar__link"><i data-lucide="folder"></i><span>Klasörlerim</span></a>
      <div class="sidebar__section-label">Hesap</div>
      <a href="pricing.html" class="sidebar__link"><i data-lucide="crown"></i><span>Planlar</span></a>
      <a href="settings.html" class="sidebar__link"><i data-lucide="settings"></i><span>Ayarlar</span></a>
      <a href="help.html" class="sidebar__link"><i data-lucide="help-circle"></i><span>Yardım</span></a>
    </nav>
    <div class="sidebar__footer">
      <div class="sidebar__user">
        <div class="sidebar__avatar" data-user-avatar>?</div>
        <div class="sidebar__user-info">
          <div class="sidebar__user-name" data-user-name>Yükleniyor...</div>
          <div class="sidebar__user-plan" data-user-plan>Ücretsiz Plan</div>
        </div>
        <button class="btn btn--icon" data-action="logout" title="Çıkış Yap"><i data-lucide="log-out"></i></button>
      </div>
    </div>
  </aside>

  <header class="topbar">
    <div class="topbar__left">
      <button class="mobile-topbar-toggle" id="sidebarToggle" aria-label="Menüyü Aç"><i data-lucide="menu"></i></button>
      <div class="topbar__breadcrumb">
        <span>NotioAI</span>
        <i data-lucide="chevron-right" style="width:14px;height:14px;"></i>
        <a href="index.html" style="color:var(--text-2)">Dashboard</a>
        <i data-lucide="chevron-right" style="width:14px;height:14px;"></i>
        <span style="color:var(--text)">Geçmiş</span>
      </div>
    </div>
    <div class="topbar__right">
      <a href="create.html" class="btn btn--primary btn--sm"><i data-lucide="plus"></i> Yeni Belge</a>
    </div>
  </header>

  <main class="app-content">
    <div class="create-header fade-up">
      <h1>Belge Geçmişi</h1>
      <p>Oluşturduğunuz tüm belgeleri görüntüleyin, indirin veya silin.</p>
    </div>

    <div class="fade-up fade-up--1" style="margin-bottom:16px;">
      <div class="input-wrap" style="max-width:360px;">
        <span class="input-wrap__icon"><i data-lucide="search"></i></span>
        <input type="text" id="historySearch" class="form-input" placeholder="Belge ara..." />
      </div>
    </div>

    <div class="docs-table fade-up fade-up--2">
      <div class="docs-table__header">
        <div>Belge Adı</div>
        <div>Tür</div>
        <div>Boyut</div>
        <div>Tarih</div>
        <div></div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
