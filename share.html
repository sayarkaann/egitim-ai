<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>Paylaşılan Belge — NotioAI</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#0e0c09; --bg-2:#151108; --bg-card:#131009; --border:rgba(255,200,140,.08); --text:#f5e8dc; --text-2:#a89278; --text-3:#6a5038; --accent:#e8855a; --radius:14px; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'DM Sans',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:40px 20px; }
    .container { max-width:760px; margin:0 auto; }
    .topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:32px; flex-wrap:wrap; gap:12px; }
    .logo { display:flex; align-items:center; gap:8px; text-decoration:none; color:var(--text); font-weight:700; font-size:1.1rem; }
    .logo-icon { background:#e8855a; border-radius:8px; width:32px; height:32px; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:1rem; }
    .card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:32px; }
    .doc-title { font-size:1.4rem; font-weight:700; margin-bottom:6px; }
    .doc-meta { color:var(--text-3); font-size:.8rem; margin-bottom:28px; display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
    .badge { display:inline-block; padding:2px 8px; border-radius:5px; font-size:.72rem; font-weight:600; text-transform:uppercase; }
    .badge-pdf { background:rgba(248,113,113,.15); color:#f87171; }
    .badge-word { background:rgba(59,130,246,.15); color:#60a5fa; }
    .badge-pptx { background:rgba(234,179,8,.15); color:#fbbf24; }
    .doc-content { font-size:.9rem; line-height:1.8; color:var(--text-2); }
    .doc-content h1 { color:var(--text); font-size:1.2rem; margin:20px 0 8px; }
    .doc-content h2 { color:var(--text); font-size:1.05rem; margin:18px 0 7px; }
    .doc-content h3 { color:var(--text); font-size:.95rem; margin:14px 0 6px; }
    .doc-content ul { padding-left:18px; margin:6px 0; }
    .doc-content li { margin-bottom:3px; }
    .doc-content p { margin-bottom:10px; }
    .slide-card { background:var(--bg-2); border:1px solid var(--border); border-radius:10px; padding:18px 20px; margin-bottom:12px; }
    .slide-num { font-size:.72rem; color:var(--text-3); margin-bottom:5px; }
    .slide-title { font-weight:700; margin-bottom:10px; }
    .expiry { color:var(--text-3); font-size:.78rem; margin-top:24px; }
    .cta { margin-top:28px; text-align:center; padding-top:24px; border-top:1px solid var(--border); }
    .cta p { color:var(--text-2); font-size:.88rem; margin-bottom:12px; }
    .btn { display:inline-flex; align-items:center; gap:6px; padding:10px 20px; border-radius:9px; font-family:inherit; font-size:.88rem; font-weight:600; cursor:pointer; border:none; text-decoration:none; }
    .btn-primary { background:#e8855a; color:#fff; }
    .btn-ghost { background:transparent; color:var(--text-2); border:1px solid var(--border); }
    .loading { text-align:center; padding:60px 0; color:var(--text-3); }
    .error { text-align:center; padding:60px 0; }
    .error h2 { font-size:1.1rem; color:#f87171; margin-bottom:8px; }
    .error p { color:var(--text-3); font-size:.88rem; }
    @media(max-width:600px) { .card { padding:20px; } .doc-title { font-size:1.15rem; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <a href="/" class="logo">
        <div class="logo-icon">N</div>
        NotioAI
      </a>
      <a href="/app/auth.html" class="btn btn-primary">Ücretsiz Dene →</a>
    </div>

    <div id="content">
      <div class="loading">Belge yükleniyor...</div>
    </div>
  </div>

  <script>
    const id = new URLSearchParams(location.search).get('id');
    if (!id) showError('Geçersiz paylaşım linki.');
    else loadDoc(id);

    async function loadDoc(id) {
      try {
        const res  = await fetch(`/api/share?id=${encodeURIComponent(id)}`);
        const data = await res.json();
        if (!res.ok) return showError(data.error || 'Belge bulunamadı.');
        render(data);
      } catch { showError('Belge yüklenemedi.'); }
    }

    function render(doc) {
      const badgeClass = `badge-${doc.type}`;
      const expires = doc.expires_at ? new Date(doc.expires_at).toLocaleDateString('tr-TR') : null;
      let bodyHtml;

      if (doc.type === 'pptx') {
        const slides = [];
        let cur = null;
        doc.content.split('\n').forEach(line => {
          const m = line.match(/^SLAYT\s*\d+\s*[:：]\s*(.+)/i);
          if (m) { if (cur) slides.push(cur); cur = { title: m[1].trim(), bullets: [] }; }
          else if (cur && /^[-•]\s+/.test(line)) cur.bullets.push(line.replace(/^[-•]\s+/,'').trim());
        });
        if (cur) slides.push(cur);
        bodyHtml = '<div class="doc-content">' + slides.map((s,i) => `
          <div class="slide-card">
            <div class="slide-num">SLAYT ${i+1}</div>
            <div class="slide-title">${esc(s.title)}</div>
            ${s.bullets.length ? '<ul>'+s.bullets.map(b=>`<li>${esc(b)}</li>`).join('')+'</ul>': ''}
          </div>`).join('') + '</div>';
      } else {
        bodyHtml = '<div class="doc-content">' + toHtml(doc.content) + '</div>';
      }

      document.getElementById('content').innerHTML = `
        <div class="card">
          <div class="doc-title">${esc(doc.title)}</div>
          <div class="doc-meta">
            <span class="badge ${badgeClass}">${doc.type.toUpperCase()}</span>
            <span>${new Date(doc.created_at).toLocaleDateString('tr-TR')}</span>
          </div>
          ${bodyHtml}
          ${expires ? `<p class="expiry">Bu link ${expires} tarihine kadar geçerlidir.</p>` : ''}
          <div class="cta">
            <p>NotioAI ile siz de saniyeler içinde belge oluşturun.</p>
            <a href="/app/auth.html" class="btn btn-primary">Ücretsiz Başla</a>
          </div>
        </div>`;
    }

    function showError(msg) {
      document.getElementById('content').innerHTML = `
        <div class="error"><h2>${esc(msg)}</h2><p>Ana sayfaya dönmek için <a href="/" style="color:#e8855a;">buraya tıklayın</a>.</p></div>`;
    }

    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function toHtml(text) {
      return text
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/^#{3}\s+(.+)$/gm,'<h3>$1</h3>')
        .replace(/^#{2}\s+(.+)$/gm,'<h2>$1</h2>')
        .replace(/^#{1}\s+(.+)$/gm,'<h1>$1</h1>')
        .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
        .replace(/^[-•]\s+(.+)$/gm,'<li>$1</li>')
        .replace(/((?:<li>.*<\/li>\n?)+)/g,'<ul>$1</ul>')
        .replace(/\n{2,}/g,'</p><p>')
        .replace(/\n/g,'<br>');
    }
  </script>
</body>
</html>
